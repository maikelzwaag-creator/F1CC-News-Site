<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700;800&family=Barlow+Semi+Condensed:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #35383d;
      --paper: #454a51;
      --ink: #f7f8fa;
      --muted: #cfd6df;
      --line: #636b78;
      --brand: #eb2d2a;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      --radius: 6px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Barlow", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(235, 45, 42, 0.08), transparent 180px),
        radial-gradient(circle at 12% 12%, rgba(255, 81, 77, 0.12), transparent 28%),
        var(--bg);
      min-height: 100vh;
    }
    .site-shell { width: min(1180px, calc(100% - 1rem)); margin: 0.6rem auto 1rem; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      border: 1px solid var(--line); border-top: 3px solid var(--brand); border-radius: var(--radius);
      background: linear-gradient(180deg, #2f3339 0%, #26292f 100%); box-shadow: var(--shadow);
      padding: 0.7rem 1rem;
    }
    .brand { margin: 0; font-family: "Barlow Semi Condensed", sans-serif; text-transform: uppercase; font-weight: 800; letter-spacing: 0.02em; }
    .brand span { color: var(--brand); }
    .tagline { color: #d4dae4; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
    .panel {
      margin-top: 0.75rem; border: 1px solid var(--line); border-radius: var(--radius); background: linear-gradient(180deg, #3f444b 0%, #383c43 100%);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .article-head { padding: 0.95rem; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, #4d535c 0%, #434952 100%); }
    .label-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.65rem; }
    .pill { border-radius: 999px; padding: 0.25rem 0.6rem; font-size: 0.74rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid transparent; }
    .pill.breaking { background: #582527; color: #ffd2d0; border-color: #8a3b3f; }
    .pill.analysis { background: #2e3e55; color: #d7e7ff; border-color: #4f6586; }
    h1 { margin: 0; font-family: "Barlow Semi Condensed", sans-serif; text-transform: uppercase; letter-spacing: -0.01em; line-height: 1.02; font-size: clamp(1.65rem, 4vw, 2.5rem); }
    .meta { margin-top: 0.55rem; color: #c7cdd7; font-weight: 600; font-size: 0.85rem; }
    .article-body { padding: 0.95rem; line-height: 1.55; font-size: 0.98rem; color: #eef2f8; }
    .image-card { margin: 0.4rem 0 0.85rem; }
    .image-card img { display: block; width: 100%; max-height: 420px; object-fit: cover; border-radius: 4px; border: 1px solid #727b8a; }
    .image-card figcaption { margin-top: 0.35rem; color: #c3cbd8; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .article-body h2 { margin: 1.05rem 0 0.45rem; font-family: "Barlow Semi Condensed", sans-serif; text-transform: uppercase; font-size: 1.08rem; border-left: 3px solid var(--brand); padding-left: 0.5rem; }
    .article-body p { margin: 0.65rem 0; }
    .back-link { display: inline-flex; margin-top: 0.9rem; color: #fff; text-decoration: none; background: #2a2e35; border: 1px solid #666f7c; border-radius: 3px; padding: 0.45rem 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .back-link:hover { background: #3a4048; }

    .frontpage {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 0.8rem;
      align-items: stretch;
      position: relative;
      z-index: 2;
    }
    .sidebar { margin-top: 0.75rem; border: 1px solid var(--line); border-radius: var(--radius); background: linear-gradient(180deg, #424851 0%, #3a3f47 100%); box-shadow: var(--shadow); overflow: hidden; }
    .sidebar-head { padding: 0.8rem 0.9rem; border-bottom: 1px solid var(--line); font-family: "Barlow Semi Condensed", sans-serif; font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; }
    .side-block { padding: 0.8rem 0.9rem; border-bottom: 1px solid #58606d; }
    .side-block:last-child { border-bottom: 0; }
    .side-title { margin: 0 0 0.6rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #cad1dc; }
    .side-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.5rem; }
    .side-list li { padding-bottom: 0.45rem; border-bottom: 1px dotted #697282; font-size: 0.93rem; line-height: 1.25; }
    .side-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .side-thumb { position: relative; margin-top: 0.8rem; border-radius: 3px; overflow: hidden; border: 1px solid #555d69; }
    .side-thumb img { display: block; width: 100%; height: auto; }
    .img-placeholder { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; text-transform: uppercase; font-weight: 600; color: rgba(255,255,255,0.7); }

    @media (max-width: 980px) {
      .frontpage { grid-template-columns: 1fr; }
      .sidebar { order: -1; }
    }
    @media (max-width: 720px) {
      .site-shell { width: calc(100% - 0.6rem); }
      .topbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

  <script src="sidebar.js"></script>
  <script src="stories.js"></script>
  <script>
  async function init() {
    await window.loadStories();

    const params = new URLSearchParams(window.location.search);
    const tag = params.get('tag');

    document.title = tag ? `${tag} - F1CC News` : 'Tags | F1CC News';
    
    const matchingStories = [];
    if (tag) {
        const lowerTag = tag.toLowerCase();
        for (const [key, story] of Object.entries(window.stories)) {
            if (story.tags && story.tags.some(t => t.toLowerCase() === lowerTag)) {
                matchingStories.push({key, ...story});
            }
        }
    }

    let html = `<article class="article"><header class="article-head"><h1>Stories tagged with: ${tag}</h1></header><div class="article-body">`;
    
    if (matchingStories.length > 0) {
        html += `<ul style="list-style: none; padding: 0;">`;
        matchingStories.forEach(s => {
            html += `
                <li style="margin-bottom: 2rem; border-bottom: 1px solid var(--line); padding-bottom: 1rem;">
                    <a href="article.html?story=${s.key}" style="text-decoration: none; color: inherit;">
                        <div style="display: flex; gap: 1rem; align-items: flex-start;">
                            <img src="${s.image}" alt="${s.title}" style="width: 150px; height: 100px; object-fit: cover; border-radius: 4px;">
                            <div>
                                <h3 style="margin: 0 0 0.5rem 0;">${s.title}</h3>
                                <p style="margin: 0; font-size: 0.9rem; color: #cfd6df;">${s.meta}</p>
                            </div>
                        </div>
                    </a>
                </li>
            `;
        });
        html += `</ul>`;
    } else {
        html += `<p>No stories found for this tag.</p>`;
    }
    
    html += `</div></article>`;
    document.getElementById('story-panel').innerHTML = html;
  }
  init();
  </script>
